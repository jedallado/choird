# Railway config for the Choird API (monorepo: set Root Directory to `api`
# and Config File path to `/api/railway.toml` in service settings).

[build]
builder = "dockerfile"
dockerfilePath = "Dockerfile"
watchPatterns = ["/api/**"]

[deploy]
preDeployCommand = ["sh ./railway/init-app.sh"]
healthcheckPath = "/up"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
